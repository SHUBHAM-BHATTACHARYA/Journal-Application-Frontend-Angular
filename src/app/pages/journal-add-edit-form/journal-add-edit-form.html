<div class="form-container">
  <!-- Dynamic title injection depending on active state -->
  <h2>{{ isAddMode ? 'Add New Journal' : 'Edit Journal' }}</h2>

  <form [formGroup]="journalAddEditForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label for="title">Title</label>
      <input id="title" type="text" formControlName="title" />
      <div *ngIf="journalAddEditForm.get('title')?.touched && journalAddEditForm.get('title')?.invalid" class="error">
        Title is required.
      </div>
    </div>

    <div class="form-group">
      <label for="content">Content</label>
      <input id="content" type="text" formControlName="content" />
      <div *ngIf="journalAddEditForm.get('content')?.touched && journalAddEditForm.get('content')?.invalid" class="error">
        Provide a valid content.
      </div>
    </div>

    <!-- Dynamic action buttons changing contextual labels -->
    <button type="submit" [disabled]="journalAddEditForm.invalid">
      {{ isAddMode ? 'Save Journal' : 'Update Journal' }}
    </button>
    
  </form>
</div>
